<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="32px" height="32px" viewBox="0 0 32 32" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>StageTracker Pro Favicon</title>
    <defs>
        <linearGradient x1="0%" y1="0%" x2="100%" y2="100%" id="gradientBg">
            <stop stop-color="#343A40" offset="0%"></stop>
            <stop stop-color="#121416" offset="100%"></stop>
        </linearGradient>
        <linearGradient x1="0%" y1="0%" x2="100%" y2="100%" id="gradientWave">
            <stop stop-color="#007BFF" offset="0%"></stop>
            <stop stop-color="#6610F2" offset="100%"></stop>
        </linearGradient>
    </defs>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <!-- Background -->
        <rect fill="url(#gradientBg)" x="0" y="0" width="32" height="32" rx="4"></rect>
        
        <!-- Waveform representation -->
        <path d="M4,16 L7,13 L10,18 L13,10 L16,22 L19,14 L22,16 L25,12 L28,16" 
              stroke="url(#gradientWave)" 
              stroke-width="2" 
              stroke-linecap="round" 
              stroke-linejoin="round">
        </path>
        
        <!-- Play button -->
        <circle cx="16" cy="16" r="6" fill="rgba(255,255,255,0.15)"></circle>
        <path d="M14,13 L20,16 L14,19 Z" fill="#FFFFFF"></path>
        
        <!-- Progress indicator -->
        <rect x="4" y="22" width="24" height="2" rx="1" fill="#6C849C" opacity="0.7"></rect>
        <rect x="4" y="22" width="10" height="2" rx="1" fill="#F8F9FA"></rect>
    </g>
</svg>