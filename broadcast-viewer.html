<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StageTracker Pro - Broadcast Viewer</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background:#0f1419; color:#e6f0ff; font-family: Segoe UI, system-ui, sans-serif }
    .viewer-wrap { max-width: 980px; margin: 20px auto; padding: 16px }
    .viewer-card { background:#151b22; border:1px solid #242c36; border-radius:12px; padding:16px; box-shadow:0 2px 20px rgba(0,0,0,0.35) }
    .title { font-weight:800; font-size:1.4rem; margin-bottom:6px }
    .artist { color:#9aa7b3; margin-bottom:14px }
    .progress { display:grid; grid-template-columns: 64px 1fr 64px; align-items:center; gap:12px; margin:10px 0 }
    .bar { height: 10px; background:#232a31; border-radius:6px; overflow:hidden; border:1px solid #2d333a }
    .fill { height:100%; width:0%; background: linear-gradient(90deg, #1f6feb, #5fb3ff) }
    .lyrics { margin-top: 16px; background:#0f1419; border:1px solid #2b3138; border-radius:10px; padding:12px; max-height:56vh; overflow:auto }
    .line { padding: 8px 10px; border-radius:8px; margin-bottom:6px; color:#cfe0f0 }
    .line.active { background:#24364a; color:#eaf4ff; font-weight:800 }
    .join { display:flex; gap:8px; margin-bottom: 12px }
    .join input { flex:1; padding:10px; border-radius:8px; border:1px solid #2b3138; background:#0f1419; color:#e6f0ff }
    .btn { background:#0a66c2; color:#fff; border:0; padding:10px 16px; border-radius:8px; font-weight:800; cursor:pointer }
  </style>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket = null;
    let state = {
      room: null,
      song: { title: '', artist: '' },
      duration: 0,
      position: 0,
      updatedAt: 0,
      playing: false,
      lyrics: [] // [{t:number, text:string}]
    };

    function connectViewer(room){
      if (!room) return;
      if (!socket) socket = io();
      state.room = room;
      socket.emit('viewer:join', { room, displayName: 'Viewer' });
    }

    function formatTime(sec){ sec=Math.max(0,sec||0); const m=Math.floor(sec/60), s=Math.floor(sec%60).toString().padStart(2,'0'); return `${m}:${s}`; }
    function render(){
      document.getElementById('songTitle').textContent = state.song?.title || '';
      document.getElementById('songArtist').textContent = state.song?.artist || '';
      const cur = document.getElementById('cur');
      const dur = document.getElementById('dur');
      const fill = document.getElementById('fill');
      cur.textContent = formatTime(state.position);
      dur.textContent = formatTime(state.duration);
      const pct = state.duration>0 ? Math.min(100, Math.max(0, (state.position/state.duration)*100)) : 0;
      fill.style.width = pct + '%';
      const lyrBox = document.getElementById('lyrics');
      lyrBox.innerHTML = '';
      const pos = state.position;
      let activeIndex = -1;
      for (let i=0;i<state.lyrics.length;i++){
        if (state.lyrics[i].t <= pos) activeIndex = i; else break;
      }
      state.lyrics.forEach((ln, idx) => {
        const div = document.createElement('div');
        div.className = 'line' + (idx===activeIndex ? ' active' : '');
        div.textContent = ln.text || '';
        lyrBox.appendChild(div);
      });
      // scroll active line into view
      if (activeIndex >= 0) {
        const el = lyrBox.children[activeIndex];
        if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
    }

    function tick(){
      const now = performance.now();
      if (state.playing && state.updatedAt) {
        const dt = (now - state.updatedAt) / 1000;
        state.position = Math.min(state.duration, state.position + dt);
        state.updatedAt = now;
        render();
      }
      requestAnimationFrame(tick);
    }

    window.addEventListener('DOMContentLoaded', () => {
      socket = io();
      socket.on('viewer:joined', () => {});
      socket.on('state:update', (s) => {
        // Trust only allowed fields
        state.song = s.song || {};
        state.duration = Number(s.duration||0);
        state.position = Number(s.position||0);
        state.playing = !!s.playing;
        state.updatedAt = performance.now();
        state.lyrics = Array.isArray(s.lyrics) ? s.lyrics : [];
        render();
      });
      document.getElementById('joinBtn').addEventListener('click', () => {
        const room = document.getElementById('room').value.trim();
        connectViewer(room);
      });
      requestAnimationFrame(tick);
    });
  </script>
  </head>
<body>
  <div class="viewer-wrap">
    <div class="join">
      <input id="room" type="text" placeholder="Enter broadcast name (room)" />
      <button id="joinBtn" class="btn">Join</button>
    </div>
    <div class="viewer-card">
      <div class="title" id="songTitle"></div>
      <div class="artist" id="songArtist"></div>
      <div class="progress">
        <div id="cur">0:00</div>
        <div class="bar"><div class="fill" id="fill"></div></div>
        <div id="dur">0:00</div>
      </div>
      <div class="lyrics" id="lyrics"></div>
    </div>
  </div>
</body>
</html>
